<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習用リサーチツール</title> <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Study Search System</h1>
        <div class="search-box">
            <input type="text" id="query" placeholder="キーワード...">
            <button onclick="searchVideos()">検索</button>
        </div>
    </header>
    <main id="video-list" class="video-grid"></main>

<script>
    const API_KEY = 'AIzaSyD-IsJ0AoerX6uTN8-dG059fRKoObVVcb0';

    async function searchVideos() {
        const query = document.getElementById('query').value;
        if (!query) return;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=10&key=${API_KEY}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.items);
        } catch (e) {
            alert("検索に失敗しました。");
        }
    }

    function displayResults(videos) {
        const container = document.getElementById('video-list');
        container.innerHTML = ''; 
        videos.forEach(video => {
            const id = video.id.videoId;
            const imgUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&url=${encodeURIComponent(video.snippet.thumbnails.medium.url)}`;
            
            const div = document.createElement('div');
            div.className = 'video-card';
            div.innerHTML = `
                <img src="${imgUrl}">
                <div class="info">
                    <div class="title">${video.snippet.title}</div>
                    <button onclick="play('${id}')">資料を見る</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // ★「資料」ボタンを押した時に動くメインの処理
    function play(id) {
        // すでに表示用の枠があるか確認し、なければ作る
        let overlay = document.getElementById('video-overlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'video-overlay';
            // 画面全体を覆う黒い背景の設定
            overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;";
            document.body.appendChild(overlay);
        }

        // 画面を表示状態にする
        overlay.style.display = 'flex';

        // 中身を書き換える（学校でブロックされにくいサーバーをiframeに入れる）
        overlay.innerHTML = `
            <button onclick="document.getElementById('video-overlay').style.display='none'" 
                style="margin-bottom:15px; padding:10px 20px; background:#cc0000; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">
                × 閉じる
            </button>
            <iframe src="https://inv.tux.pizza/embed/${id}" 
                style="width:90%; max-width:800px; aspect-ratio:16/9; border:2px solid #333; border-radius:10px; background:black;" 
                allowfullscreen>
            </iframe>
        `;
    }
</script>
</body>
</html>
