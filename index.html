<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習用リサーチツール</title> <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Study Search System</h1>
        <div class="search-box">
            <input type="text" id="query" placeholder="キーワード...">
            <button onclick="searchVideos()">検索</button>
        </div>
    </header>
    <main id="video-list" class="video-grid"></main>

    <script>
        const API_KEY = 'AIzaSyD-IsJ0AoerX6uTN8-dG059fRKoObVVcb0';

        async function searchVideos() {
            const query = document.getElementById('query').value;
            if (!query) return;
            // APIを叩く（ここは学校でも通ることが多いです）
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=10&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.items);
        }

        function displayResults(videos) {
            const container = document.getElementById('video-list');
            container.innerHTML = ''; 
            videos.forEach(video => {
                const id = video.id.videoId;
                // ★画像のブロックを回避（Googleの中継サーバーを利用）
                const imgUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&url=${encodeURIComponent(video.snippet.thumbnails.medium.url)}`;
                
                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <img src="${imgUrl}">
                    <div class="info">
                        <div class="title">${video.snippet.title}</div>
                        <button onclick="play('${id}')">資料を見る</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ★ playVideo関数を以下のように書き換えます
function playVideo(id) {
    // 既存のリストを隠すか、上に重ねるためのエリアを作る
    let overlay = document.getElementById('video-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'video-overlay';
        overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center;";
        document.body.appendChild(overlay);
    }
    overlay.style.display = 'flex';

    // 学校にバレにくい「中継サーバー」を、iframeの中に隠して表示
    // URLが外から見えないので、ブロックされにくくなります
    overlay.innerHTML = `
        <button onclick="document.getElementById('video-overlay').style.display='none'" style="margin-bottom:10px; padding:10px; background:#f44336; color:white; border:none; border-radius:5px; cursor:pointer;">閉じる</button>
        <iframe src="https://inv.tux.pizza/embed/${id}" style="width:90%; max-width:800px; aspect-ratio:16/9; border:none; border-radius:10px;"></iframe>
    `;
}
    </script>
</body>
</html>
