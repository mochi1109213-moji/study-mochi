<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学習用リサーチツール</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 動画再生用の黒い画面（オーバーレイ）のスタイル */
        #video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none; /* 最初は隠しておく */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        iframe {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 2px solid #444;
            border-radius: 10px;
        }
        .close-btn {
            margin-bottom: 15px;
            padding: 10px 25px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Study Search System</h1>
        <div class="search-box">
            <input type="text" id="query" placeholder="キーワードを入力...">
            <button onclick="searchVideos()">検索</button>
        </div>
    </header>

    <main id="video-list" class="video-grid"></main>

    <div id="video-overlay">
        <button class="close-btn" onclick="closeVideo()">× 閉じる</button>
        <div id="player-container" style="width: 100%; display: flex; justify-content: center;"></div>
    </div>

    <script>
        // ★ 自分のAPIキーを入れてください
        const API_KEY = 'AIzaSyD-IsJ0AoerX6uTN8-dG059fRKoObVVcb0';

        async function searchVideos() {
            const query = document.getElementById('query').value;
            if (!query) return;
            
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=10&key=${API_KEY}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                displayResults(data.items);
            } catch (e) {
                alert("検索中にエラーが発生しました。");
            }
        }

        function displayResults(videos) {
            const container = document.getElementById('video-list');
            container.innerHTML = ''; 

            videos.forEach(video => {
                const id = video.id.videoId;
                // 画像ブロック回避用の中継URL
                const imgUrl = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&url=${encodeURIComponent(video.snippet.thumbnails.medium.url)}`;
                
                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <img src="${imgUrl}">
                    <div class="info">
                        <div class="title">${video.snippet.title}</div>
                        <button onclick="play('${id}')">資料を見る</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

   function play(id) {
    // ページ内に表示するのではなく、フィルターにかかりにくいサイトを別タブで開く
    // 「https://google.com/url?q=...」を通すと、学校のフィルターを騙せる場合があります
    const finalUrl = `https://invidious.sethforprivacy.com/watch?v=${id}`;
    const proxyUrl = `https://www.google.com/url?q=${encodeURIComponent(finalUrl)}`;
    
    window.open(proxyUrl, '_blank');
}
    </script>
</body>
</html>
